      operationId: ListOrderItems
      description: |
        Returns a list of Order items.

        The special symbol "-" can be used as the order identifier, orderId, to indicate
        that Order items must be returned for all orders.
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/orderId'
        - $ref: '#/components/parameters/pageToken'
        - name: pageSize
