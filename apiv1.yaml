---
openapi: 3.0.3
info:
  version: 1.0.0
  title: UnifyOrdering Public API
  description: |
    This document describes public API for integration with UnifyOrdering Ltd.

    ## Overview

    This API covers the following parts of the interaction with UnifyOrdering:

    * **Orders API** information about orders, confirm and cancel orders.
    * **Products API** managing with the product catalog: creating a new product, updating product attributes,
      showing/hiding the product.
    * **Settings API** managing price settings, visibility, delivery days setup.
    * **Buyers API** manage buyers specific settings (prices, visibility, delivery days).

    ## Authentication

    Before any API request can be made, authentication must be performed.

    For authorization, the [OAuth 2.0](https://oauth.net/2/) protocol and
    ["Client Credentials Flow"](https://www.oauth.com/oauth2-servers/access-tokens/client-credentials/) are used.
    As a result of authorization, Public API issues a token. It must be used in subsequent calls to API methods.
    The issued token has a lifetime, after which you need to get a new token. When accessing the API with an expired
    token, the API will respond with an appropriate error.

    To receive a token, send a POST request with client credentials (CLIENTID and CLIENTSECRET) and indication
    of the flow type to https://oauth.unifyordering.com/oauth2/token.

    If you do not have client credentials yet, request them from the our support team.

    Client credentials can be passed both through the standard HTTP authentication mechanism and through HTTP request
    parameters.

    An example request with HTTP client authentication using curl:

    ```bash
    curl -X POST -u CLIENTID:CLIENTSECRET 'https://oauth.unifyordering.com/oauth2/token' -d 'grant_type=client_credentials'
    ```

    An example of a request passing details through parameters using curl:

    ```bash
    curl -X POST 'https://oauth.unifyordering.com/oauth2/token' -d 'grant_type=client_credentials&client_id=CLIENTID&client_secret=CLIENTSECRET'
    ```

    The result of this request is JSON with a body:
    ```json
    {
      "access_token": "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJhdWQiOltdLCJleHAiOjE2NjIxMDU5MDMsImlhdCI6MTY2MjEwMjMwMywiaXNzIjoiaHR0cHM6Ly9vYXV0aC1kZXYudW5pZnlvcmRlcmluZy5jb20vb2F1dGgyIiwianRpIjoiNzQzMTRlMDItNzk0NS00ODEzLWFjZjctM2MwYjFjYWY4YjMxIiwib3JnYW5pc2F0aW9uX2lkIjoiMSIsInNjcCI6W10sInVzZXJfdG9rZW4iOiJhYjcyOWMyNTA0NDQ3YmNmMmFlNjk2NzE2NWQ4MzVkZCJ9.JZdBfynxlW-BXFK1U61KAWzlJ5ysBYRnQ74P1JpGHUIofAO6ltffo85lJosdwlkN0MBROr4yyT5TWlImRRgf7_61iUOWShf_NfJapF3a94De4ysv2FVfOvLujTdb0aFq-Ri4uVCZjdPo8p9hFlsHk5ytZmBx-GB9vNqwkUWHmDxSemSGKVGBC9s9enxBHRq25XT--XgtTr5QjU0HAcQM9QcfasR5Jv_pPPCJM235OKp86rnuiZxG8-cXfqThw2LIKhKOFKI2eYFfQcQThRYY_6FjHeWb7vh8x0AoPxdraXg9SHK6BtmLRYK4vwA6Ox7vHF6YjWTQEv5un_5r43BwSA",
      "expires_in": 3599,
      "scope": "pubapi",
      "token_type": "bearer"
    }
    ```
