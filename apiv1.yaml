        '200':
          $ref: '#/components/responses/GetOrderResponse'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        default:
          $ref: '#/components/responses/5xx'
  /orders/{orderId}/confirm:
    post:
      summary: Confirm the order by specified ID
      operationId: ConfirmOrder
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/orderId'
      responses:
        '204':
          description: Success.
        '400':
          description: |
            The order is already confirmed or can't be confirmed (only order in the status `new` can be confirmed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                already_confirmed:
                  summary: |
                    Occurs when trying to confirm an already confirmed order.
                  value:
                    code: 400
                    message: The order is already confirmed
                invalid_status:
                  summary: |
                    Occurs when trying to confirm an order when it is in a state from which the
                    order cannot be confirmed.
                  value:
                    code: 400
                    message: The order can't be confirmed
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        default:
          $ref: '#/components/responses/5xx'
  /orders/{orderId}/cancel:
    post:
