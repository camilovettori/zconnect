      description: A detailed information about specified order.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Order'
          example:
            id: '1234'
            createTime: '2022-01-01T05:45:12+05:00'
            deliveryDate: '2022-01-04'
            totalVatAmount:
              amount: 1380
              currencyCode: EUR
            totalNetAmount:
              amount: 6000
              currencyCode: EUR
            totalDeliveryFee:
              amount: 0
              currencyCode: EUR
            status: new
            deliveryAddress: Dublin, Republic of Ireland
            buyerId: '140'
            externalBuyerId: '410'
    ListOrderCommentsResponse:
      description: A paged array of order comments.
      content:
        application/json:
          schema:
            type: object
            properties:
              comments:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
            example:
              nextPageToken: 'BAwEC_4IAAQIBBk9mZnNldAEEAAEFTGltaXQBBAAAAAf_ggEEAQIA'
              comments:
                - id: '1202'
                  createTime: '2022-08-03T10:16:28+05:00'
