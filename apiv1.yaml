        - name: statuses
          in: query
          description: |
            Order item statuses:
             * `new` - The order item was just created.
             * `confirmed` - The order item was reviewed by the supplier.
             * `canceled` - The order item was canceled by the buyer or supplier.
             * `received` - The order item was confirmed the receipt by buyer.
             * `checked` - The order item was checked the contents of delivered order for any issues by the buyer.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - new
                - confirmed
                - canceled
                - received
                - checked
          example: [ new ]
      responses:
