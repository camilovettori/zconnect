      parameters:
        - $ref: '#/components/parameters/orderId'
      responses:
        '204':
          description: Success.
        '400':
          description: |
            The order is already canceled or can't be canceled (only order
            in the status `new` / `confirmed` can be canceled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                already_canceled:
                  summary: |
                    Occurs when trying to cancel an already canceled order.
                  value:
                    code: 400
                    message: The order is already canceled
                invalid_status:
                  summary: |
                    Occurs when trying to cancel an order when it is in a state from which the
                    order cannot be canceled.
                  value:
                    code: 400
                    message: The order can't be canceled
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        default:
          $ref: '#/components/responses/5xx'
  /orders/{orderId}/items:
    get:
