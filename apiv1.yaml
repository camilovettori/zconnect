  securitySchemes:
    ApiKeyJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        To receive a token, send a POST request with client credentials (CLIENTID and CLIENTSECRET) and indication
        of the flow type to https://oauth.unifyordering.com/oauth2/token.

        If you do not have client credentials yet, request them from the our support team.

        Client credentials can be passed both through the standard HTTP authentication mechanism and through HTTP request
        parameters.
        An example request with HTTP client authentication using curl:

        ```bash
        curl -X POST -u CLIENTID:CLIENTSECRET 'https://oauth.unifyordering.com/oauth2/token' -d 'grant_type=client_credentials'
        ```
  schemas:
    ApiError: # inspired by https://cloud.google.com/apis/design/errors
      type: object
      description: The `ApiError` defines a logical error model in API.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: The code of error.
          format: int32
          example: 404
        message:
          type: string
          description: A developer-facing human-readable error message.
          example: 'entity with id #1234 not found'
        details:
          type: array
          description: A list of additional data that carry the error details.
          items:
            type: object
            description: Contains an arbitrary serialized data that describes the extra error details.
            additionalProperties: true
            example:
              entityId: 1234
    BusinessProfile:
      type: object
      required:
        - displayName
        - emails
      properties:
        displayName:
          type: string
          description: The business name for display in the UI.
          example: 'McCallum Pub & Restaurant'
        emails:
          type: array
          items:
            type: string
            format: email
          example: [ 'example1@example.com', 'example2@example.com' ]
    DeliveryDate:
      type: object
      required:
        - id
        - startDate
        - canDeliver
        - periodic
      properties:
        id:
          type: string
          format: uuid
          description: The delivery date unique ID in UnifyOrdering system.
          example: 01H3KQR44GF5YS4WXEADPEARKH
        startDate:
          type: string
          format: date
          description: Indicates the beginning of the period (delivery/non-delivery). Should be in the future.
          example: '2023-01-04'
        endDate:
          type: string
          format: date
          description: Indicates the end of the period (delivery/non-delivery). Optional, should be in future.
          example: '2023-01-10'
        canDeliver:
          type: boolean
          description: Indicates that delivery is possible on that dates.
          example: true
        note:
          type: string
          description: Optional text commentary for the users needs (max 100 characters).
          maxLength: 100
        periodic:
          type: object
          properties:
            frequency:
              type: string
              enum:
                - day
                - week
                - month
              description: |
                Describes a recurring period: day, week, month.
              example: day
            interval:
              type: integer
              description: |
                Describes a step of repetition. E.g. interval=2, frequency=week interprets as “every 2 week”.
              minimum: 0
              example: 2
    DeliveryDay:
      type: object
      properties:
        canDeliver:
          type: boolean
          description: The value of this field indicates whether delivery is possible on this day or not.
        cutOff:
          type: object
          required:
            - daysBefore
            - timeBefore
          properties:
            daysBefore:
              type: integer
              minimum: 0
              maximum: 5
              example: 5
            timeBefore:
              type: string
              example: "15:00"
    DeliveryDaySettings:
      type: object
      required:
        - mon
        - tue
        - wed
        - thu
        - fri
        - sat
        - sun
      properties:
        mon:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
        tue:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
        wed:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
        thu:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
        fri:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
        sat:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
        sun:
          allOf:
            - $ref: "#/components/schemas/DeliveryDay"
    OrderingSettings:
      type: object
      required:
        - minimumOrderAmount
      properties:
        minimumOrderAmount:
          type: integer
          description: |
            Amount should be a monetary value using a currency's smallest unit (e.g. euro cents, penny, usd cents).
          minimum: 0
          example: 10000
    Organisation:
      type: object
      required:
        - id
        - displayName
        - businessAddress
        - createTime
      properties:
        id:
          type: string
          description: The organisation ID in UnifyOrdering system.
          example: '170'
        vatNumber:
          type: string
          description: The unique number that identifies a taxable person (business).
          example: '1234567X'
        displayName:
          type: string
          description: The organisation name for display in the UI.
          example: 'McCullum Pub & Restaurant'
        logoUrl:
          type: string
          description: The organisation logo image URL.
          example: https://unify-logos.s3.eu-west-1.amazonaws.com/org/logos/1234-5678.jpeg
        businessAddress:
          type: string
          description: The organisation address.
          example: 'Main Street, Ballygillaroe, Redcross, Co. Wicklow, A67 H799, Republic of Ireland'
        createTime:
          type: string
          format: date-time
          description: |
            The time of comment will be added. String in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
          example: '2017-07-21T17:32:28Z'
    Buyer:
      type: object
      required:
        - id
        - externalBuyerId
      properties:
        id:
          type: string
          description: The Buyer ID in UnifyOrdering system or the Buyer Account ID (supplier-side identifier).
          readOnly: true
          example: '98762'
        externalBuyerId:
          type: string
          description: The ID of buyer organisation (in integrator system) that made the order.
          example: 'EX-12345'
    Comment:
      type: object
      required:
        - id
        - orderId
        - message
        - createTime
      properties:
        id:
          type: string
          description: The order comment ID in UnifyOrdering system.
          example: '3456'
        orderId:
          type: string
          description: the ID of the order for which this comment was added.
          example: '1234'
        createTime:
          type: string
          format: date-time
          description: |
            The time of comment will be added. String in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
          example: '2017-07-21T17:32:28Z'
        message:
          type: string
          description: A message.
          example: 'butter must be at least 82% fat'
    OrderItem:
      type: object
      required:
        - id
        - orderId
        - productModificationId
        - quantity
        - price
        - totalNetAmount
        - totalVatAmount
      properties:
        id:
          type: string
          description: The order item ID in UnifyOrdering system.
          example: '4356'
        orderId:
          type: string
          description: the ID of the order for which this item was added.
          example: '1234'
        productModificationId:
          type: string
          description: The ID of final product that the buyer is offered to buy
          example: '4242'
        externalProductModificationId:
          type: string
          description: The external ID (in supplier system) of final product that the buyer is offered to buy.
          example: 'COLA123'
        quantity:
          type: integer
          description: The amount of product ordered.
          example: 12
        size:
          type: number
          description: The size ordered product (for a weight product).
          example: 1
        price:
          $ref: '#/components/schemas/Money'
        totalVatAmount:
          $ref: '#/components/schemas/Money'
        totalNetAmount:
          $ref: '#/components/schemas/Money'
    Order:
      type: object
      required:
        - id
        - createTime
        - deliveryDate
        - totalVatAmount
        - totalNetAmount
        - totalDeliveryFee
        - status
        - deliveryAddress
        - deliveryAddressDetails
        - contractorId
        - buyerId
        - externalContractorId
        - externalBuyerId
        - externalId
      properties:
        id:
          type: string
          description: The order ID in UnifyOrdering system.
          example: '12345'
        createTime:
          type: string
          format: date-time
          description: |
            The timestamp when this order will be created.
            String in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
          example: '2017-07-21T17:32:28Z'
        deliveryDate:
          type: string
          format: date
          description: The date when this order will be delivered.
          example: '2023-01-04'
        totalVatAmount:
          $ref: '#/components/schemas/Money'
        totalNetAmount:
          $ref: '#/components/schemas/Money'
        totalDeliveryFee:
          $ref: '#/components/schemas/Money'
        status:
          type: string
          description: The current status of the order.
          example: 'confirmed'
        deliveryAddress:
          type: string
          description: The address to which the order will be delivered.
          example: '15 Merrion Row, Dublin, Republic of Ireland'
        deliveryAddressDetails:
          description: The address (structured) to which the order will be delivered.
          allOf:
            - $ref: '#/components/schemas/AddressDetails'
          example:
            address1: '15 Merrion Row'
            address2: 'Dublin 2'
            county: 'Dublin'
            country: 'Republic of Ireland'
            postalTown: 'Dublin'
            postalCode: 'D02 RP20'
        contractorId:
          type: string
          description: |
            The ID of buyer organisation (in UnifyOrdering) that made the order.

            This field is **deprecated**. Use `buyerId` instead.
          deprecated: true
          example: '12345'
        buyerId:
          type: string
          description: The ID of buyer organisation (in UnifyOrdering) that made the order.
          example: '12345'
        externalContractorId:
          type: string
          description: |
            The ID of buyer organisation (in integrator system) that made the order.

            This field is **deprecated**. Use `externalBuyerId` instead.
          example: 'EX-12345'
        externalBuyerId:
          type: string
          description: The ID of buyer organisation (in integrator system) that made the order.
          example: 'EX-12345'
        externalId:
          type: string
          description: The external ID (in supplier system) of the order.
          example: 'ORD123'
          nullable: true
        additionalBuyerField1:
          type: string
          description: Additional buyer field 1 from the monolith API.
          nullable: true
        additionalBuyerField2:
          type: string
          description: Additional buyer field 2 from the monolith API.
          nullable: true
    AddressDetails:
      type: object
      required:
        - address1
        - country
        - county
      properties:
        address1:
          type: string
          description: The first line of the address.
          example: '15 Merrion Row'
        address2:
          type: string
          description: The second line of the address.
          example: 'Dublin 2'
        county:
          type: string
          description: The city of the address.
          example: 'Dublin'
        country:
          type: string
          description: The country of the address.
          example: 'Republic of Ireland'
        countryCode:
          type: string
          description: The country code of the address in ISO 3166-1 alpha-2 format.
          example: 'IE'
        postalTown:
          type: string
          description: The postal town of the address.
          example: 'Dublin'
        postalCode:
          type: string
          description: The postal code of the address.
          example: 'D02 RP20'
    Money:
      type: object
      required:
        - amount
        - currencyCode
      properties:
        amount:
          type: number
          description: |
            Amount should be a monetary value using a currency's smallest unit (e.g. euro cents, penny, usd cents).
          example: 1000
        currency:
          type: string
          readOnly: true
          description: The alphabetic currency code. In ISO 4217 format.
          example: EUR
    ProductSize:
      type: object
      required:
        - amount
        - unit
      properties:
        amount:
          type: string
          description: The product size.
          example: '12'
        unit:
          type: string
          description: The product modification size units.
          enum:
            - 'L'
            - 'ml'
            - 'g'
            - 'kg'
            - 'in'
            - 'cm'
            - 'lbs'
            - 'cl'
            - 'm'
            - 'oz'
            - 'Per Unit'
            - 'pint'
            - 'mm'
            - 'w'
            - 'gsm'
            - 'mg'
            - 'cc'
          example: 'kg'
    ProductCategory:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
          description: The product category ID in UnifyOrdering system.
          readOnly: true
          example: '4567'
        displayName:
          type: string
          description: The product category name for display in the UI.
          maxLength: 150
          example: 'Soft Drinks'
        parentCategoryId:
          type: string
          description: The parent category ID, when current category is subcategory.
          example: '4500'
    Product:
      type: object
      required:
        - id
        - displayName
        - categoryId
      properties:
        id:
          type: string
          description: The product unique ID in UnifyOrdering system.
          readOnly: true
          example: '42'
        displayName:
          type: string
          description: The product name for display in the UI.
          example: Coca-Cola
        description:
          type: string
          description: The product description.
          example: Delicious soft-drink ever.
        categoryId:
          type: string
          description: The unique ID of product category for this product.
          example: '456'
        imageUrl:
          type: string
          description: The product image URL.
          example: https://unify-img.s3.eu-west1.amazonaws.com/products/images/1234567-98772.jpeg
        modifications:
          type: array
          items:
            $ref: "#/components/schemas/ProductModification"
          readOnly: true
          example:
            - id: 4444
              balance: 120
              size:
                amount: '330'
                unit: 'ml'
              packaging: 'Bottle'
              barcode: '0 4936509'
              quantity: 1
              isVisible: true
              externalProductModificationId: 'COKE12345'
              price:
                amount: 1400
                currencyCode: EUR
    Operation:
      type: object
      required:
        - id
        - description
        - createdAt
        - done
      properties:
        id:
          type: string
          format: uuid
          description: "the unique ID of the Operation"
          example: "6D3692C3-F75E-4BFB-B298-14EDA32BFECD"
          readOnly: true
        description:
            type: string
            description: "a human readable, short description of the Operation"
            example: "Import job #1234 for org #4567"
        createdAt:
            type: string
            format: date-time
            description: "the Operation creation time. Specified in RFC3339 format."
            example: "2021-03-04T19:02:42+00:00"
            readOnly: true
        updatedAt:
            type: string
            format: date-time
            description: "the time the Operation was last modified. Specified in RFC3339 format."
            example: "2022-01-02T19:04:12+00:00"
            readOnly: true
        done:
            type: boolean
            description: |
              Status of the operation.

              *true* -- the operation is completed.
              The operation is considered completed, even if an error occurred during its execution.

              *false* -- the operation is not completed.
            readOnly: true
            example: true
        response:
            type: object
            additionalProperties: { }
            description: |
              Contains the result of the operation if it is important to the user.

              The field is present only if the operation was completed successfully.
              The *error* and *response* fields are mutually exclusive.
            readOnly: true
            example:
              generatedReportUrl: 'https://report-bucket.s3.eu-west-1.amazonaws.com/123-456-789/report.xlsx'
        error:
            type: object
            description: |
              Error message.

              This field is present if an error occurred during the operation.
              The *error* and *response* fields are mutually exclusive.
            readOnly: true
            required:
              - code
            properties:
              code:
                type: string
                description: the code of error
                example: import_job.duplicate_item
              details:
                type: object
                additionalProperties: { }
                description: A list of additional data that carry the error details.
                example:
                  duplicateItems: [ 1, 2, 3, 4 ]
    ProductModification:
      type: object
      required:
        - id
        - productId
        - packaging
        - isVisible
      properties:
        id:
          type: string
          description: The product modification unique ID in UnifyOrdering system.
          readOnly: true
          example: '325'
        productId:
          type: string
          description: The product ID in UnifyOrdering system.
          example: '1234'
        balance:
          type: number
          description: |
            The stock balance of the product modification.

            If not set, then the quantity in stock is not limited.
          nullable: true
          example: 255
        size:
          $ref: '#/components/schemas/ProductSize'
        packaging:
          type: string
          description: The product modification packaging.
          enum:
            - 'Per Kg'
            - 'Pack'
            - 'Per L'
            - 'Box'
            - 'Single'
            - 'Per Lb'
            - 'Jug'
            - 'Jar'
            - 'Case'
            - 'Bag'
            - 'Tray'
            - 'Tub'
            - 'Punnet'
            - 'Side'
            - 'Carton'
            - 'Head'
            - 'Tin'
            - 'Bunch'
            - 'Bottle'
            - 'Bale'
            - 'Roll'
            - 'Custom'
            - 'Bucket'
            - 'Gallon'
            - 'Per Oz'
            - 'Pcs'
          example: 'Per Kg'
        barcode:
          type: string
          description: The product modification barcode.
          example: '12345678'
        quantity:
          type: number
          description: The product modification quantity in unit.
          example: 10
        isVisible:
          type: boolean
          description: The product modification visibility (for Buyers).
          example: false
        externalProductModificationId:
          type: string
          description: |
            The external ID (in supplier system) of product modification
            that the buyer is offered to buy.

            Synonym of SKU (stock keeping unit).
          example: 'COLA123'
        price:
          $ref: '#/components/schemas/Money'
    nextPageToken:
      type: string
      description: |
        This token allows you to get the next page of results for list requests. If the number of results
        is larger than pageSize, use the nextPageToken as the value for the pageToken query parameter in
        the next list request. Each subsequent list request will have its own nextPageToken to continue paging
        through the results.
      example: 'If-BAwEC_4IAAQIBBk9mZnNldAEEAAEFTGltaXQBBAAAAAf_ggECAQIA'
  parameters:
    pageToken:
      name: pageToken
      in: query
      description: |
        A string token returned in the response of your previous request.
        If pageToken is provided, it's used to retrieve the next page of order results.
      required: false
      schema:
        type: string
      example: 'If-BAwEC_4IAAQIBBk9mZnNldAEEAAEFTGltaXQBBAAAAAf_ggECAQIA'
    deliveryDateId:
      name: deliveryDateId
      in: path
      required: true
      schema:
        type: string
      description: The delivery date ID inside UnifyOrdering system.
    buyerId:
      name: buyerId
      in: path
      required: true
      description: The buyer ID inside UnifyOrdering system.
      schema:
        type: string
      example: '123456'
    productSettingsId:
      name: productSettingsId
      in: path
      required: true
      description: The contractor product settings ID inside UnifyOrdering system.
      schema:
        type: string
      example: '456789'
    orderId:
      name: orderId
      in: path
      required: true
      description: The order ID inside UnifyOrdering system.
      schema:
        type: string
      example: '42'
    productCategoryId:
      name: productCategoryId
      in: path
      required: true
      description: The product category ID inside UnifyOrdering system.
      schema:
        type: string
      example: '1'
    productId:
      name: productId
      in: path
      required: true
      description: The product ID inside UnifyOrdering system.
      schema:
