components:
  requestBodies:
    CreateDeliveryDatesSettingsRequest:
      description: Create delivery / non-delivery dates request.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    UpdateDeliveryDateSettingsRequest:
      description: Update delivery / non-delivery dates request.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    CreateBuyerDeliveryDateSettingsRequest:
      description: Create buyer delivery / non-delivery dates request.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    UpdateBuyerDeliveryDateSettingsRequest:
      description: Update buyer delivery / non-delivery dates request.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    UpdateBuyerDeliveryDaysSettingsRequest:
      description: Update buyer delivery day settings data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDaySettings'
    UpdateDeliveryDaysSettingsRequest:
      description: Update delivery day settings data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDaySettings'
    UpdateOrderingSettingsRequest:
      description: Update ordering settings data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderingSettings'
    CreateProductCategoryRequest:
      description: Create product category data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductCategory'
    UpdateProductCategoryRequest:
      description: Update product category data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductCategory'
    BatchUpdatePricesRequest:
      required: true
      description: Batch update prices request data.
      content:
        application/json:
          schema:
            type: array
            description: List of product prices.
            items:
              type: object
              required:
                - externalProductModificationId
                - externalBuyerId
                - price
              properties:
                externalProductModificationId:
                  type: string
                  description: The external ID (in supplier system) of final product that the buyer is offered to buy.
                externalBuyerId:
                  type: string
                  description: The ID of buyer organisation (in integrator system) that made the order.
                price:
                  type: integer
                  description: Price in cents.
          example:
            - externalProductModificationId: 'COKE12345'
              externalBuyerId: 'BUYER123'
              price: 10000
    CreateProductRequest:
      description: Create a product request data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Product'
          example:
            displayName: 'Coca Cola'
            description: A carbonated soft drink manufactured by the Coca-Cola Company.
            categoryId: '6543'
            imageUrl: 'https://unifyordering.s3.eu-west-1.amazonaws.com/products/coke.jpeg'
            modifications:
              - id: 4444
                balance: 120
                size:
                  amount: '330'
                  unit: 'ml'
                packaging: 'Bottle'
                barcode: '0 4936509'
                quantity: 1
                isVisible: true
                externalProductModificationId: 'COKE12345'
    UpdateProductRequest:
      description: Update a product request data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Product'
          example:
            id: 1234
            displayName: 'Coca Cola'
            description: A carbonated soft drink manufactured by the Coca-Cola Company.
            categoryId: '6543'
            imageUrl: 'https://unifyordering.s3.eu-west-1.amazonaws.com/products/coke.jpeg'
            modifications:
              - id: 4444
                balance: 120
                size:
                  amount: '330'
                  unit: 'ml'
                packaging: 'Bottle'
                barcode: '0 4936509'
                quantity: 1
                isVisible: true
                externalProductModificationId: 'COKE12345'
    CreateProductModificationRequest:
      description: Create a product modification request data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductModification'
          example:
            productId: 1
            balance: 120
            size:
              amount: '330'
              unit: 'ml'
            packaging: 'Bottle'
            barcode: '0 4936509'
            quantity: 1
            isVisible: true
            externalProductModificationId: 'COKE12345'
            price:
              amount: 3444
    UpdateProductModificationRequest:
      description: Update a product modification request data.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductModification'
          example:
            id: 4444
            balance: 120
            size:
              amount: '330'
              unit: 'ml'
            packaging: 'Bottle'
            barcode: '0 4936509'
            quantity: 1
            isVisible: true
            externalProductModificationId: 'COKE12345'
    BatchCancelOrderItemsRequest:
      description: Batch cancel a order item request data.
      required: true
      content:
        application/json:
          schema:
            required:
              - orderItemIds
            properties:
              orderItemIds:
                type: array
                items:
                  type: string
                example: [ 112233, 445566, 123123, 456456 ]
    BatchConfirmOrderItemsRequest:
      description: Batch confirm a order item request data.
      required: true
      content:
        application/json:
          schema:
            required:
              - orderItemIds
            properties:
              orderItemIds:
                type: array
                items:
                  type: string
                example: [ 112233, 445566, 123123, 456456 ]
  responses:
    '401':
      description: Not authorized request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            code: 401
            message: Request not authenticated due to missing, invalid, or expired API token.
    '404':
      description: The resource specified does not exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            code: 404
            message: The order not found
    '5xx':
      description: An unexpected condition occurred that prevented the server from fulfilling the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            code: 500
            message: Internal server error.
    GetBusinessProfileResponse:
      description: Retrieve business profile response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BusinessProfile'
    ListBuyerDeliveryDatesSettingsResponse:
      description: The response of buyer delivery dates settings.
      content:
        application/json:
          schema:
            type: object
            required:
              - deliveryDates
            properties:
              deliveryDates:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryDate'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
    ListDeliveryDatesSettingsResponse:
      description: The response of delivery dates settings.
      content:
        application/json:
          schema:
            type: object
            required:
              - deliveryDates
            properties:
              deliveryDates:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryDate'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
    CreateDeliveryDatesSettingsResponse:
      description: The response of new delivery dates settings.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    UpdateDeliveryDateSettingsResponse:
      description: The response of update delivery dates settings.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    UpdateBuyerDeliveryDateSettingsResponse:
      description: The response of update buyer delivery dates settings.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDate'
    GetBuyerDeliveryDaysSettingsResponse:
      description: Retrieve buyer delivery settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDaySettings'
    UpdateBuyerDeliveryDaysSettingsResponse:
      description: Update buyer delivery settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDaySettings'
    GetDeliveryDaysSettingsResponse:
      description: Retrieve delivery settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDaySettings'
    UpdateDeliveryDaysSettingsResponse:
      description: Update delivery settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeliveryDaySettings'
    GetOrderingSettingsResponse:
      description: Retrieve an order settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderingSettings'
          example:
            minimumOrderAmount: 10000
    UpdateOrderSettingsResponse:
      description: Updates an order settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderingSettings'
          example:
            minimumOrderAmount: 10000
    GetBuyerOrderingSettingsResponse:
      description: Retrieve an order settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderingSettings'
          example:
            minimumOrderAmount: 10000
    UpdateBuyerOrderingSettingsResponse:
      description: Updates an order settings response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderingSettings'
          example:
            minimumOrderAmount: 10000
    ListOrdersResponse:
      description: A paged array of orders.
      content:
        application/json:
          schema:
            type: object
            required:
              - orders
            properties:
              orders:
                type: array
                nullable: true
                items:
                  $ref: '#/components/schemas/Order'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
          example:
            nextPageToken: 'If-BAwEC_4IAAQIBBk9mZnNldAEEAAEFTGltaXQBBAAAAAf_ggECAQIA'
            orders:
              - id: '1234'
                createTime: '2022-01-01T05:45:12+05:00'
                deliveryDate: '2022-01-04'
                totalVatAmount:
                  amount: 1380
                  currencyCode: EUR
                totalNetAmount:
                  amount: 6000
                  currencyCode: EUR
                totalDeliveryFee:
                  amount: 0
                  currencyCode: EUR
                status: new
                deliveryAddress: Dublin, Republic of Ireland
                buyerId: '140'
                externalBuyerId: '410'
    ListBuyersResponse:
      description: A paged array of buyers.
      content:
        application/json:
          schema:
            type: object
            required:
              - buyers
            properties:
              buyers:
                type: array
                items:
                  $ref: '#/components/schemas/Buyer'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
    GetBuyerOrganisationResponse:
      description: A detailed information about specified organisation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Organisation'
          example:
            id: '42'
            vatNumber: '1234567WA'
            displayName: 'Example Company'
