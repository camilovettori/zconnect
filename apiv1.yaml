        - $ref: '#/components/parameters/buyerId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrderingSettingsRequest'
      responses:
        '200':
          $ref: '#/components/responses/UpdateBuyerOrderingSettingsResponse'
        '400':
          description: Request has missing or invalid parameters and cannot be parsed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                code: 400
                message: Unknown product id has been specified.
