  /orders:
    get:
      summary: List all orders
      operationId: ListOrders
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - name: pageSize
          in: query
          description: |
            The maximum number of results per page to return.
            If the number of available results is larger than pageSize, the service returns
            a nextPageToken than can be used to get the next page of results in subsequent request.

            The maximum value is 100.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 100
            default: 10
          example: 20
        - name: statuses
          in: query
          description: |
            Order status:
             * `new` - The order was just created.
             * `confirmed` - The order was reviewed by the supplier.
             * `canceled` - The order was canceled by the buyer or supplier.
             * `received` - The order was confirmed the receipt by buyer.
             * `checked` - The order was checked the contents of delivered order for any issues by the buyer.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - new
                - confirmed
                - canceled
                - received
                - checked
          example: [ confirmed ]
      responses:
        '200':
          $ref: '#/components/responses/ListOrdersResponse'
        '400':
          description: Request has missing or invalid parameters and cannot be parsed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                code: 400
                message: Invalid order status filter.
        '401':
          $ref: '#/components/responses/401'
        default:
          $ref: '#/components/responses/5xx'
  /orders/{orderId}:
