                - id: '1234'
                  createTime: '2022-08-03T12:36:34+05:00'
                  message: 'Add 2 apples to this order.'
    ListOrderItemsResponse:
      description: A paged array of order items.
      content:
        application/json:
          schema:
            type: object
            properties:
              orderItems:
                type: array
                items:
                  $ref: '#/components/schemas/OrderItem'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
            example:
              nextPageToken: BAwEC_4IAAQIBBk9mZnNldAEEAAEFTGltaXQBBAAAAAf_ggEBAQIA
              orderItems:
                - id: '1234'
                  productModificationId: '4567'
                  externalProductModificationId: 'P00612'
                  quantity: 10
                  size: 2.5
                  totalVatAmount:
                    amount: 123
                    currencyCode: EUR
                  totalNetAmount:
                    amount: 4123
                    currencyCode: EUR
    ListProductCategoriesResponse:
      description: A paged array of product categories.
      content:
        application/json:
          schema:
            type: object
            properties:
              productCategories:
                type: array
                items:
                  $ref: '#/components/schemas/ProductCategory'
              nextPageToken:
                $ref: '#/components/schemas/nextPageToken'
            example:
              nextPageToken: BAwEC_4IAAQIBBk9mZnNldAEEAAEFTGltaXQBBAAAAAf_ggEBAQIA
              productCategories:
                - id: '1234'
                  displayName: 'Meats'
                - id: '3456'
                  displayName: 'Chicken'
                  parentCategoryId: '1234'
                - id: '4567'
                  displayName: 'Juices'
    GetProductCategoryResponse:
      description: A detailed information about specified product category.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductCategory'
          example:
